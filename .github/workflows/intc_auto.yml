name: INTC Auto Tracker

on:
  schedule:
    - cron: "17 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intc-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull INTC daily OHLCV
        run: python scripts/update_stock_intc.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add data/INTC_daily.csv
          git diff --cached --quiet || git commit -m "auto update INTC daily data"
          git push
