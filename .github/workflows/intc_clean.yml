name: INTC Clean Data Auto

on:
  schedule:
    - cron: "25 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-intc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run clean INTC updater
        run: python scripts/update_stock_intc_clean.py

      - name: Commit clean data
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add data/INTC_daily_clean.csv
          git diff --cached --quiet || git commit -m "update clean INTC data"
          git push
