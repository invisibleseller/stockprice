name: Update All Stocks

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run CSV update
        run: python scripts/update_multi_stock.py

      - name: Generate MD files
        run: python scripts/generate_md.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ md/
          git commit -m "auto update all stocks and md" || echo "no changes"
          git pull --rebase origin main
          git push origin main
