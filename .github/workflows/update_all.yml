name: Update All Stocks

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-all-stocks-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run CSV update
        run: python scripts/update_multi_stock.py

      - name: Generate MD files
        run: python scripts/generate_md.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ md/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "auto update all stocks and md"
          git push origin HEAD:main
