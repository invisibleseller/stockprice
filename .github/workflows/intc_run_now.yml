name: INTC Run Now

on:
  push:

permissions:
  contents: write

jobs:
  run-now:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run INTC script
        run: python scripts/update_stock_intc.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add data/INTC_daily.csv
          git diff --cached --quiet || git commit -m "init INTC data"
          git push
