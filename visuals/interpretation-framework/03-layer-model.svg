<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.13"/></filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker>
</defs>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; dominant-baseline: middle; }
  .small { font-size: 19px; fill: #64748B; font-weight: 500; }
</style>
<rect width="1200" height="900" fill="#F7F3EA"/>
<circle cx="1020" cy="110" r="130" fill="#FFE7B8" opacity="0.55"/>
<circle cx="120" cy="790" r="150" fill="#CFE8FF" opacity="0.5"/>
<text x="600.0" y="62.0" text-anchor="middle" font-size="34" font-weight="800" fill="#172033">
<tspan x="600.0" dy="0.0">方案三｜事实层 / 解读层 / 情绪层</tspan>
</text>
<text x="600.0" y="112.0" text-anchor="middle" font-size="20" font-weight="500" fill="#64748B">
<tspan x="600.0" dy="0.0">把看不见的心理过程分层：我们常以为在回应事实，其实在回应解读</tspan>
</text>
<rect x="160" y="190" width="880" height="118" rx="30" fill="#FEE2E2" stroke="#DC2626" stroke-width="3" filter="url(#shadow)"/><text x="300" y="228.0" text-anchor="middle" font-size="28" font-weight="900" fill="#DC2626">
<tspan x="300" dy="0.0">情绪层</tspan>
</text><text x="600" y="225.0" text-anchor="middle" font-size="22" font-weight="800" fill="#334155">
<tspan x="600" dy="0.0">我现在的感受</tspan>
</text><text x="600" y="268.0" text-anchor="middle" font-size="22" font-weight="600" fill="#475569">
<tspan x="600" dy="0.0">愤怒 / 委屈 / 失落 / 防御</tspan>
</text><rect x="160" y="360" width="880" height="118" rx="30" fill="#FEF3C7" stroke="#D97706" stroke-width="3" filter="url(#shadow)"/><text x="300" y="398.0" text-anchor="middle" font-size="28" font-weight="900" fill="#D97706">
<tspan x="300" dy="0.0">解读层</tspan>
</text><text x="600" y="395.0" text-anchor="middle" font-size="22" font-weight="800" fill="#334155">
<tspan x="600" dy="0.0">我认为这件事意味着什么</tspan>
</text><text x="600" y="438.0" text-anchor="middle" font-size="22" font-weight="600" fill="#475569">
<tspan x="600" dy="0.0">不尊重我 / 不在乎这个家 / 我孩子不行 / 他是故意的</tspan>
</text><rect x="160" y="530" width="880" height="118" rx="30" fill="#DBEAFE" stroke="#2563EB" stroke-width="3" filter="url(#shadow)"/><text x="300" y="568.0" text-anchor="middle" font-size="28" font-weight="900" fill="#2563EB">
<tspan x="300" dy="0.0">事实层</tspan>
</text><text x="600" y="565.0" text-anchor="middle" font-size="22" font-weight="800" fill="#334155">
<tspan x="600" dy="0.0">真实发生了什么</tspan>
</text><text x="600" y="608.0" text-anchor="middle" font-size="22" font-weight="600" fill="#475569">
<tspan x="600" dy="0.0">孩子没回应 / 伴侣晚归 / 老师反馈 / 孩子哭闹</tspan>
</text><path d="M600 528 L600 486" stroke="#2563EB" stroke-width="4" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><path d="M600 358 L600 316" stroke="#D97706" stroke-width="4" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><text x="600" y="690.0" text-anchor="middle" font-size="26" font-weight="900" fill="#172033">
<tspan x="600" dy="0.0">关键问题</tspan>
</text><rect x="250" y="725" width="700" height="86" rx="28" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/><text x="600" y="754.0" text-anchor="middle" font-size="25" font-weight="800" fill="#172033">
<tspan x="600" dy="0.0">我此刻是在回应“事实”，还是在回应“我对事实的解读”？</tspan>
</text><text x="600" y="790.0" text-anchor="middle" font-size="20" font-weight="600" fill="#64748B">
<tspan x="600" dy="0.0">找到中间的解读，情绪就有了调整入口。</tspan>
</text></svg>
