<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.13"/></filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker>
</defs>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; dominant-baseline: middle; }
  .small { font-size: 19px; fill: #64748B; font-weight: 500; }
</style>
<rect width="1200" height="900" fill="#F7F3EA"/>
<circle cx="1020" cy="110" r="130" fill="#FFE7B8" opacity="0.55"/>
<circle cx="120" cy="790" r="150" fill="#CFE8FF" opacity="0.5"/>
<text x="600.0" y="62.0" text-anchor="middle" font-size="34" font-weight="800" fill="#172033">
<tspan x="600.0" dy="0.0">方案四｜自动反应路径 vs 有觉察路径</tspan>
</text>
<text x="600.0" y="112.0" text-anchor="middle" font-size="20" font-weight="500" fill="#64748B">
<tspan x="600.0" dy="0.0">课程转变目标：从被情绪带走，到有选择地回应</tspan>
</text>
<rect x="430" y="150" width="340" height="72" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/><text x="600" y="186.0" text-anchor="middle" font-size="27" font-weight="900" fill="#172033">
<tspan x="600" dy="0.0">同一件事发生</tspan>
</text><path d="M600 225 L600 270" stroke="#64748B" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="85" y="285" width="465" height="440" rx="30" fill="#FFF1F2" stroke="#FB7185" stroke-width="3" filter="url(#shadow)"/><rect x="650" y="285" width="465" height="440" rx="30" fill="#F0FDF4" stroke="#22C55E" stroke-width="3" filter="url(#shadow)"/><text x="317" y="325.0" text-anchor="middle" font-size="26" font-weight="900" fill="#BE123C">
<tspan x="317" dy="0.0">看不见解读：自动反应路径</tspan>
</text><text x="882" y="325.0" text-anchor="middle" font-size="26" font-weight="900" fill="#15803D">
<tspan x="882" dy="0.0">看见解读：有觉察路径</tspan>
</text><rect x="145" y="370" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.8" filter="url(#shadow)"/><text x="223" y="394.0" text-anchor="middle" font-size="18" font-weight="900" fill="#E11D48">
<tspan x="223" dy="0.0">事实</tspan>
</text><text x="370" y="394.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="370" dy="0.0">孩子没回应</tspan>
</text><path d="M317 419 L317 432" stroke="#E11D48" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="145" y="436" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.8" filter="url(#shadow)"/><text x="223" y="460.0" text-anchor="middle" font-size="18" font-weight="900" fill="#E11D48">
<tspan x="223" dy="0.0">负面解读</tspan>
</text><text x="370" y="460.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="370" dy="0.0">他不尊重我</tspan>
</text><path d="M317 485 L317 498" stroke="#E11D48" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="145" y="502" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.8" filter="url(#shadow)"/><text x="223" y="526.0" text-anchor="middle" font-size="18" font-weight="900" fill="#E11D48">
<tspan x="223" dy="0.0">负面情绪</tspan>
</text><text x="370" y="526.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="370" dy="0.0">生气 / 委屈</tspan>
</text><path d="M317 551 L317 564" stroke="#E11D48" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="145" y="568" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.8" filter="url(#shadow)"/><text x="223" y="592.0" text-anchor="middle" font-size="18" font-weight="900" fill="#E11D48">
<tspan x="223" dy="0.0">自动反应</tspan>
</text><text x="370" y="592.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="370" dy="0.0">指责 / 防御 / 冷战</tspan>
</text><path d="M317 617 L317 630" stroke="#E11D48" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="145" y="634" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.8" filter="url(#shadow)"/><text x="223" y="658.0" text-anchor="middle" font-size="18" font-weight="900" fill="#E11D48">
<tspan x="223" dy="0.0">结果</tspan>
</text><text x="370" y="658.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="370" dy="0.0">关系受伤 / 自我内耗</tspan>
</text><rect x="710" y="370" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8" filter="url(#shadow)"/><text x="788" y="394.0" text-anchor="middle" font-size="18" font-weight="900" fill="#16A34A">
<tspan x="788" dy="0.0">事实</tspan>
</text><text x="935" y="394.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="935" dy="0.0">孩子没回应</tspan>
</text><path d="M882 419 L882 432" stroke="#16A34A" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="710" y="436" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8" filter="url(#shadow)"/><text x="788" y="460.0" text-anchor="middle" font-size="18" font-weight="900" fill="#16A34A">
<tspan x="788" dy="0.0">暂停看见</tspan>
</text><text x="935" y="460.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="935" dy="0.0">这是我的解读</tspan>
</text><path d="M882 485 L882 498" stroke="#16A34A" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="710" y="502" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8" filter="url(#shadow)"/><text x="788" y="526.0" text-anchor="middle" font-size="18" font-weight="900" fill="#16A34A">
<tspan x="788" dy="0.0">寻找可能</tspan>
</text><text x="935" y="526.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="935" dy="0.0">也许他没听见 / 正专注</tspan>
</text><path d="M882 551 L882 564" stroke="#16A34A" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="710" y="568" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8" filter="url(#shadow)"/><text x="788" y="592.0" text-anchor="middle" font-size="18" font-weight="900" fill="#16A34A">
<tspan x="788" dy="0.0">情绪松动</tspan>
</text><text x="935" y="592.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="935" dy="0.0">没那么生气</tspan>
</text><path d="M882 617 L882 630" stroke="#16A34A" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round"/><rect x="710" y="634" width="345" height="47" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.8" filter="url(#shadow)"/><text x="788" y="658.0" text-anchor="middle" font-size="18" font-weight="900" fill="#16A34A">
<tspan x="788" dy="0.0">新选择</tspan>
</text><text x="935" y="658.0" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">
<tspan x="935" dy="0.0">确认 / 表达 / 回应</tspan>
</text><rect x="245" y="775" width="710" height="70" rx="26" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/><text x="600" y="810.0" text-anchor="middle" font-size="24" font-weight="800" fill="#172033">
<tspan x="600" dy="0.0">课程要练的不是“不生气”，而是先看见：我把这件事解读成了什么。</tspan>
</text></svg>
